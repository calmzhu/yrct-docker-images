name: Build OpenVPN Image

on:
  workflow_dispatch:
    inputs:
      tag:
        default: "latest"
        description: "image tag to build"
        required: true
concurrency:
  group: build-openvpn-${{ github.ref }}
  cancel-in-progress: true
env:
  DOCKER_USER: "yrct"
  DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_AUTH }}
  DOCKER_IMAGE: "yrct/openvpn"
  DOCKERFILE: "Dockerfile"
jobs:
  build:
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Login to registory
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: | # https://semver.org/
            ${{ env.DOCKER_IMAGE }}
          tags: | # https://momentjs.com/docs/#/displaying/format/
            type=raw,value=latest
            type=raw,value=${{ inputs.tag }}
          labels: | # https://github.com/opencontainers/image-spec/blob/master/annotations.md
            org.opencontainers.image.vendor=${{ github.repository_owner }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./openvpn
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
