name: Mirror
on:
  push:
    branches:
      - main
    paths:
      - 'mirrors.yaml'
  workflow_dispatch:
    inputs:
      source:
        description: "Source image defined in mirrors.yaml"
        required: false
concurrency:
  group: mirror-${{ github.ref }}
  cancel-in-progress: false
jobs:
  prepare:
    outputs:
      mirrors: ${{ steps.prep.outputs.mirrors }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install yq
        uses: mikefarah/yq@v4
      - name: generate mirror list
        id: prep
        shell: bash
        run: |
          set -e
          if [[ -n "${{ inputs.source }}" ]]; then
            mirrors=$(yq "[.[] | select(.source == \"${{ inputs.source }}\") | {\"source\": .source, \"dst\": .dst, \"tags\": [.tags[].name]}]" -o json -I 0 mirrors.yaml)
          else
            commit_count=$(git log --oneline mirrors.yaml | wc -l)
            if [[ $commit_count -le 1 ]]; then
              mirrors=$(yq '[.[] | {"source": .source, "dst": .dst, "tags": [.tags[].name]}]' -o json -I 0 mirrors.yaml)
            else
              last_commit=$(git log -2 --pretty=format:"%h" mirrors.yaml | tail -n 1)

              # Export both versions as source-keyed JSON maps for position-independent diff
              export_map() {
                yq '[.[] | {"source": .source, "dst": .dst, "tags": ([.tags[].name] | sort)}]' -o json -I 0 "$1" \
                  | jq 'map({key: .source, value: .}) | from_entries'
              }
              export_map mirrors.yaml > /tmp/current_map.json
              git show "$last_commit":mirrors.yaml > /tmp/prev_mirrors.yaml
              export_map /tmp/prev_mirrors.yaml > /tmp/last_map.json

              # Find added or modified entries by comparing maps key-by-key
              mirrors=$(jq -n -c \
                --slurpfile cur /tmp/current_map.json \
                --slurpfile last /tmp/last_map.json \
                '$cur[0] | to_entries | map(select(.value != $last[0][.key])) | map(.value)')
            fi
          fi
          echo "mirrors=${mirrors}" >> "$GITHUB_OUTPUT"
          echo "mirror_count=$(echo "${mirrors}" | jq -r 'length')"

  mirror:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.mirrors != '[]' && needs.prepare.outputs.mirrors != ''
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        mirror: ${{ fromJson(needs.prepare.outputs.mirrors) }}
    env:
      TARGET_BASE: ${{ vars.ALIYUN_ECR_URL }}
    steps:
      - name: install regctl
        uses: regclient/actions/regctl-installer@main
      - name: install jq
        run: |
          if ! command -v jq &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi
        shell: bash
      - name: mirror image
        shell: bash
        run: |
          # Write matrix item to file for safe jq parsing
          cat <<'MATRIX_EOF' > /tmp/item.json
          ${{ toJson(matrix.mirror) }}
          MATRIX_EOF

          source=$(jq -r '.source' /tmp/item.json)
          dst=$(jq -r '.dst' /tmp/item.json)

          # Login to both registries
          regctl registry login docker.io \
            -u "${{ secrets.DOCKER_HUB_USERNAME }}" \
            -p "${{ secrets.DOCKER_HUB_AUTH }}"
          regctl registry login "${TARGET_BASE}" \
            -u "${{ secrets.ALIYUN_ECR_USERNAME }}" \
            -p "${{ secrets.ALIYUN_ECR_AUTH }}"

          # Copy all tags in parallel (max 4 concurrent copies for same image)
          jq -r '.tags[]' /tmp/item.json | xargs -P 4 -I {} \
            regctl image copy "${source}:{}" "${TARGET_BASE}/${dst}:{}"
