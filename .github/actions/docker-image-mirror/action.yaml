name: "Docker image mirror push"
description: 'GitHub Action to mirror a docker image to other registry'
author: 'Calm Zhu'
inputs:
  source-image:
    description: "Source image full name"
    required: true
  target-registry:
    description: "Target image registry base url"
    required: true
  target-registry-user:
    description: "Target image registry username"
    required: true
  target-registry-password:
    required: true
    description: "Target image registry password"
  target-image-name:
    description: "name of target image"
    required: true
  tags:
    required: true
    description: "versions to mirror (space-separated)"
  docker-io-user:
    required: false
    description: "username for docker.io login"
    default: ""
  docker-io-token:
    required: false
    description: "password for docker.io login"
    default: ""
runs:
  using: 'composite'
  steps:
    - name: mirror images
      shell: bash
      run: |
        # Login to docker.io if credentials provided
        if [[ -n "${{ inputs.docker-io-user }}" ]]; then
          regctl registry login docker.io \
            -u "${{ inputs.docker-io-user }}" \
            -p "${{ inputs.docker-io-token }}"
        fi
        regctl registry login "${{ inputs.target-registry }}" \
          -u "${{ inputs.target-registry-user }}" \
          -p "${{ inputs.target-registry-password }}"

        tags_list=$(echo "${{ inputs.tags }}" | tr ',' ' ')
        echo "${tags_list}" | xargs -P 4 -I {} \
          regctl image copy \
            "${{ inputs.source-image }}:{}" \
            "${{ inputs.target-registry }}/${{ inputs.target-image-name }}:{}"
